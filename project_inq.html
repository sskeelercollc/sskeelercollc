<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Property Questionnaire by SS Keeler Co LLC.">
    <title>Property Questionnaire | SS Keeler Co, LLC</title>

    <link rel="icon" href="/favicon.ico?v=2">
    <link rel="shortcut icon" href="/favicon.ico">

    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Libre Baskerville', serif;
            line-height: 1.6;
            background-color: #000;
        }

        header {
            background:#2f5d50;
            color:white;
            padding:20px;
            display:flex;
            align-items:center;
            justify-content:center;
            position:relative;
            text-align:center;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            column-gap: 35px;
            row-gap: 10px;
            margin-top: 15px;
        }

        .form-grid > div {
            display: flex;
            flex-direction: column;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        label {
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 3px solid #ccc;
            font-size: 14px;
            box-sizing: border-box;
        }

        textarea {
            min-height: 50px;
            resize: vertical;
        }

        .large-textarea {
            min-height: 100px;
        }

        .form-section {
            margin-bottom: 25px;
        }

        .summary-box input {
            background: #f5f5f5;
            font-weight: bold;
        }

        button {
            margin-top: 30px;
            padding: 12px 20px;
            border: 3px solid #ccc;
            background-color: #2f5d50;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #24473d;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #222;
            color: white;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

<header>
<h1>SS Keeler Co, LLC</h1>
</header>

<main>

<div class="container">

<h1>Property Intake + Underwriting</h1>

<form action="https://formspree.io/f/mgororvr" method="POST">

<!-- PROPERTY -->
<div class="form-section">
<h2>Property Details</h2>

<div class="form-grid">

<div>
<label>Monthly Rent</label>
<input type="number" id="monthly_rent" name="monthly_rent">
</div>

<div>
<label>Occupancy (%)</label>
<input type="number" name="occupancy_percent">
</div>

</div>
</div>

<!-- OTHER INCOME -->
<div class="form-section">
<h2>Additional Other Income</h2>

<div class="form-grid">

<div>
<label>Income Type 1</label>
<input type="text">
</div>

<div>
<label>Amount 1</label>
<input type="number" step="0.01" min="0" class="other-income">
</div>

<div>
<label>Income Type 2</label>
<input type="text">
</div>

<div>
<label>Amount 2</label>
<input type="number" step="0.01" min="0" class="other-income">
</div>

<div>
<label>Income Type 3</label>
<input type="text">
</div>

<div>
<label>Amount 3</label>
<input type="number" step="0.01" min="0" class="other-income">
</div>

</div>
</div>

<!-- UNDERWRITING SUMMARY -->
<div class="form-section summary-box">
<h2>Underwriting Summary</h2>

<div class="form-grid">

<div>
<label>Total Monthly Income</label>
<input type="number" id="total_monthly_income" readonly>
</div>

<div>
<label>Annual Gross Income</label>
<input type="number" id="annual_income" readonly>
</div>

</div>
</div>

<div style="text-align:center;">
<button type="submit">Submit Inquiry</button>
</div>

</form>
</div>

</main>

<footer>
<p>© 2026 SS Keeler Co, LLC</p>
</footer>

<script>
function calculateIncome() {
    let rent = parseFloat(document.getElementById('monthly_rent').value) || 0;

    let otherInputs = document.querySelectorAll('.other-income');
    let otherTotal = 0;

    otherInputs.forEach(input => {
        otherTotal += parseFloat(input.value) || 0;
    });

    let monthlyTotal = rent + otherTotal;
    let annualTotal = monthlyTotal * 12;

    document.getElementById('total_monthly_income').value = monthlyTotal.toFixed(2);
    document.getElementById('annual_income').value = annualTotal.toFixed(2);
}

document.addEventListener('input', calculateIncome);
</script>

</body>
</html>
