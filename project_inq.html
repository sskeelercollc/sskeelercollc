<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Property Questionnaire by SS Keeler Co LLC.">
    <title>Property Questionnaire | SS Keeler Co, LLC</title>

    <link rel="icon" href="/favicon.ico?v=2">
    <link rel="shortcut icon" href="/favicon.ico">

    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Libre Baskerville', serif;
            line-height: 1.6;
            background-color: #000;
        }

        header {
            background:#2f5d50;
            color:white;
            padding:20px;
            display:flex;
            align-items:center;
            justify-content:center;
            position:relative;
            text-align:center;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .container h2 {
            margin-top: 30px;
            border-bottom: 3px solid #eee;
            padding-bottom: 5px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            column-gap: 30px;
            row-gap: 8px;
            margin-top: 15px;
        }

        .form-grid > div {
            display: flex;
            flex-direction: column;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        label {
            margin-bottom: 4px;
            font-weight: bold;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 3px solid #ccc;
            font-size: 14px;
            box-sizing: border-box;
        }

        textarea {
            min-height: 50px;
            resize: vertical;
        }

        .large-textarea {
            min-height: 100px;
        }

        .form-section {
            margin-bottom: 20px;
        }

        button {
            margin-top: 30px;
            padding: 12px 20px;
            border: 3px solid #ccc;
            background-color: #2f5d50;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #24473d;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #222;
            color: white;
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
            }

            header img {
                position: static !important;
                width: 120px !important;
                margin: 10px auto;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<main>

<div class="container">

<h1 style="text-align:center;">Project Inquiry</h1>
<p style="text-align:center;">Provide a brief overview of your property or project.</p>

<form action="https://formspree.io/f/mgororvr" method="POST">

<input type="hidden" name="source" value="Project Inquiry">
<input type="text" name="_gotcha" style="display:none">

<!-- PROPERTY -->
<div class="form-section">
<h2>Property Details</h2>

<div class="form-grid">

<div>
<label>Property Type</label>
<select name="property_type">
<option>NO SELECTION</option>
<option>Single Family</option>
<option>Duplex</option>
<option>Triplex</option>
<option>Quadplex</option>
<option>Multifamily (5+ Units)</option>
<option>Mixed-Use</option>
<option>Retail</option>
<option>Office</option>
<option>Industrial</option>
<option>Other</option>
</select>
</div>

<div>
<label>Property Category #1</label>
<select name="property_category_1">
<option>NO SELECTION</option>
<option>Residential</option>
<option>Commercial</option>
</select>
</div>

<div>
<label>Property Category #2</label>
<select name="property_category_2">
<option>NO SELECTION</option>
<option>Residential</option>
<option>Commercial</option>
</select>
</div>

<div>
<label># Units</label>
<input type="number" name="unit_spaces">
</div>

<div>
<label>Total Units</label>
<input type="number" name="total_units">
</div>

<div>
<label>Square Footage</label>
<input type="number" name="square_footage">
</div>

<div>
<label>Year Built</label>
<input type="number" name="year_built">
</div>

<div>
<label>Property Condition</label>
<select name="property_condition">
<option>NO SELECTION</option>
<option>Excellent</option>
<option>Good</option>
<option>Fair</option>
<option>Poor</option>
<option>Distressed</option>
</select>
</div>

<div class="full-width">
<label>Repairs Needed</label>
<textarea name="repairs_needed" class="large-textarea"></textarea>
</div>

<div class="full-width">
<label>Major Issues</label>
<textarea name="major_issues" class="large-textarea"></textarea>
</div>

<div>
<label>Asking Price ($)</label>
<input type="number" step="0.01" min="0" name="asking_price">
</div>

<div>
<label>Estimated Value ($)</label>
<input type="number" step="0.01" min="0" name="estimated_value">
</div>

<div>
<label>Total Monthly Rent ($)</label>
<input type="number" step="0.01" min="0" name="monthly_rent">
</div>

</div>
</div>

<div style="text-align:center;">
<button type="submit">Submit Inquiry</button>
<p style="font-size:12px;">
By submitting, you agree to our <a href="privacy.html">Privacy Policy</a>.
</p>
</div>

</form>
</div>

</main>

</footer>
